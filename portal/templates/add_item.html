{% extends 'base.html' %}

{% block content %}
<div class="page-title">
  <h1>Add New Item</h1>
  <p>Post a lost or found item. Include a photo to help identify it!</p>
</div>

<div style="max-width: 600px; margin: 0 auto;">
  <form method="post" class="form-box" enctype="multipart/form-data">
    {% csrf_token %}

    <div class="form-group">
      <label for="title">Item Title *</label>
      <input type="text" id="title" name="title" placeholder="e.g., Black Wallet, Red Backpack" required>
    </div>

    <div class="form-group">
      <label for="description">Description *</label>
      <textarea id="description" name="description" placeholder="Describe the item details..." required></textarea>
    </div>

    <div class="form-group">
      <label for="location">Location Found/Lost *</label>
      <input type="text" id="location" name="location" placeholder="e.g., College Library" required>
    </div>

    <div class="form-group">
      <label for="item_type">Item Type *</label>
      <select id="item_type" name="item_type" required>
        <option value="">-- Select --</option>
        <option value="Lost">Lost</option>
        <option value="Found">Found</option>
      </select>
    </div>

    <div class="form-group">
      <label for="image">Item Image (Optional)</label>
      <input type="file" id="image" name="image" accept="image/*">
      <small>Formats: JPG, PNG, GIF (Max 5MB)</small>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Post Item</button>
      <a href="{% url 'home' %}" class="btn-secondary">Cancel</a>
    </div>
  </form>
</div>

{% endblock %}
